name: Auto Publish 

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:         
  publish:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4.2.0

    - name: Setup Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: 24 
        registry-url: https://registry.npmjs.org/
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build 
      run: pnpm build

    - name: Test 
      run: pnpm test 

    - name: Apply Version
      run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag

    - name: Publish package 
      run: npm publish --access public
